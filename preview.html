<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>README Preview</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1f2328;
      background: #fff;
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    h1 { font-size: 2em; border-bottom: 1px solid #d1d9e0; padding-bottom: .3em; margin-top: 24px; margin-bottom: 16px; }
    h2 { font-size: 1.5em; border-bottom: 1px solid #d1d9e0; padding-bottom: .3em; margin-top: 24px; margin-bottom: 16px; }
    h3 { font-size: 1.25em; margin-top: 24px; margin-bottom: 16px; }
    p { margin-bottom: 16px; }
    code {
      background: #eff1f3;
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 85%;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 16px;
      line-height: 1.45;
    }
    pre code { background: none; padding: 0; font-size: 85%; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
    th, td { border: 1px solid #d1d9e0; padding: 8px 13px; text-align: left; }
    th { background: #f6f8fa; font-weight: 600; }
    tr:nth-child(even) { background: #f6f8fa; }
    blockquote {
      border-left: 4px solid #d1d9e0;
      color: #656d76;
      padding: 0 16px;
      margin-bottom: 16px;
    }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid #d1d9e0; margin: 24px 0; }
    ul, ol { padding-left: 2em; margin-bottom: 16px; }
    li { margin-bottom: 4px; }
    strong { font-weight: 600; }
    img { max-width: 100%; }
  </style>
</head>
<body>
  <div id="content">Loading...</div>
  <script>
    fetch('/README.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById('content').textContent = 'Failed to load README.md: ' + err;
      });
  </script>
</body>
</html>
